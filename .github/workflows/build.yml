name: Build and Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  ZIG_VERSION: "0.14.0"
  APP_NAME: "spectre"
  APP_VERSION: "0.1.0"

jobs:
  build-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: aarch64

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        run: |
          curl -L "https://ziglang.org/download/${ZIG_VERSION}/zig-linux-${{ matrix.arch }}-${ZIG_VERSION}.tar.xz" | tar -xJ
          echo "$PWD/zig-linux-${{ matrix.arch }}-${ZIG_VERSION}" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev pkg-config patchelf

      - name: Build and Bundle
        run: zig build prod

      - name: Create tarball
        run: tar -czvf ${{ env.APP_NAME }}-linux-${{ matrix.arch }}.tar.gz -C dist .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: ${{ env.APP_NAME }}-linux-${{ matrix.arch }}.tar.gz

  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13
            arch: x86_64
            zig_arch: x86_64
          - runner: macos-14
            arch: arm64
            zig_arch: aarch64

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        run: |
          curl -L "https://ziglang.org/download/${ZIG_VERSION}/zig-macos-${{ matrix.zig_arch }}-${ZIG_VERSION}.tar.xz" | tar -xJ
          echo "$PWD/zig-macos-${{ matrix.zig_arch }}-${ZIG_VERSION}" >> $GITHUB_PATH

      - name: Install dependencies
        run: brew install gtk4 libadwaita pkg-config create-dmg

      - name: Build and Bundle
        run: zig build prod

      - name: Create ZIP
        run: cd dist && zip -r ../${{ env.APP_NAME }}-macos-${{ matrix.arch }}.zip Spectre.app

      - name: Create DMG
        run: |
          create-dmg \
            --volname "Spectre" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Spectre.app" 150 190 \
            --app-drop-link 450 185 \
            "${{ env.APP_NAME }}-macos-${{ matrix.arch }}.dmg" \
            "dist/Spectre.app" || \
          hdiutil create -volname "Spectre" -srcfolder "dist/Spectre.app" \
            -ov -format UDZO "${{ env.APP_NAME }}-macos-${{ matrix.arch }}.dmg"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: |
            ${{ env.APP_NAME }}-macos-${{ matrix.arch }}.zip
            ${{ env.APP_NAME }}-macos-${{ matrix.arch }}.dmg

  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gtk4
            mingw-w64-ucrt-x86_64-libadwaita
            mingw-w64-ucrt-x86_64-pkg-config
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-binutils
            zip
            unzip

      - name: Install Zig
        shell: msys2 {0}
        run: |
          curl -L -o zig.zip "https://ziglang.org/download/${{ env.ZIG_VERSION }}/zig-windows-x86_64-${{ env.ZIG_VERSION }}.zip"
          unzip zig.zip
          echo "ZIG_PATH=$PWD/zig-windows-x86_64-${{ env.ZIG_VERSION }}" >> $GITHUB_ENV

      - name: Build and Bundle
        shell: msys2 {0}
        run: |
          export PATH="$ZIG_PATH:/ucrt64/bin:$PATH"
          export PKG_CONFIG_PATH="/ucrt64/lib/pkgconfig:/ucrt64/share/pkgconfig"
          export LIBRARY_PATH="/ucrt64/lib"
          zig build prod

      - name: Create ZIP
        shell: msys2 {0}
        run: cd dist && zip -r ../${{ env.APP_NAME }}-windows-x86_64.zip .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: ${{ env.APP_NAME }}-windows-x86_64.zip

  release:
    needs: [build-linux, build-macos, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/**/*.dmg
          generate_release_notes: true
